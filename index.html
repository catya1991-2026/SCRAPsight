<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCRAPsight</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  
  // REPLACE WITH YOUR CONFIG
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    projectId: "YOUR_PROJECT_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window._db = db;
  window._fbFns = { collection, addDoc, serverTimestamp };
</script>

<style>
  :root {
    --bg: #050505;
    --surface: #121212;
    --surface2: #1a1a1a;
    --border: #333333;
    --accent: #ff2d55; /* Cyber Pink */
    --accent2: #ffffff; /* Stark White */
    --text: #ffffff;
    --muted: #888888;
    --good: #00ffa3;
    --bad: #ff3b30;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255, 45, 85, 0.05) 39px, rgba(255, 45, 85, 0.05) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255, 255, 255, 0.03) 39px, rgba(255, 255, 255, 0.03) 40px);
  }

  /* ── HEADER ── */
  .header {
    background: #000;
    border-bottom: 3px solid var(--accent);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-badge {
    background: var(--accent2);
    color: #000;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    font-weight: 900;
    padding: 4px 10px;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .header h1 span { color: var(--accent); }

  /* ── TABS ── */
  .tab-nav { display: flex; max-width: 900px; margin: 28px auto 0; padding: 0 24px; }
  .tab-btn {
    flex: 1; padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
  }
  .tab-btn.active { color: var(--accent); border-color: var(--accent); background: var(--surface2); }
  .tab-indicator { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: transparent; }
  .tab-btn.active .tab-indicator { background: var(--accent); }

  /* ── FORM ELEMENTS ── */
  .container { max-width: 900px; margin: 0 auto; padding: 24px; }
  
  .team-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent2);
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    margin-bottom: 24px;
  }

  .section { background: var(--surface); border: 1px solid var(--border); margin-bottom: 24px; }
  .section-header {
    padding: 15px 20px;
    background: linear-gradient(90deg, rgba(255, 45, 85, 0.15), transparent);
    border-bottom: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    text-transform: uppercase;
  }

  .field-group { display: flex; flex-direction: column; gap: 5px; padding: 15px; }
  label { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; }
  
  input, select, textarea {
    background: #000;
    border: 1px solid var(--border);
    color: #fff;
    padding: 12px;
    font-family: 'Barlow', sans-serif;
    outline: none;
  }
  input:focus { border-color: var(--accent); }

  .actions { display: flex; justify-content: flex-end; gap: 10px; padding: 20px; }
  .btn {
    padding: 12px 24px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
  }
  .btn-submit { background: var(--accent); color: white; }
  .btn-clear { background: transparent; border: 1px solid var(--border); color: var(--muted); }

  .panel { display: none; }
  .panel.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">SCRAPsight</div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('ei')">01 // Engineering Inspiration<div class="tab-indicator"></div></button>
  <button class="tab-btn" onclick="switchTab('perf')">02 // Performance<div class="tab-indicator"></div></button>
</div>

<div class="container">
  <div class="team-bar">
    <div class="field-group">
      <label>Team Number</label>
      <input type="number" id="teamNum" placeholder="0000">
    </div>
    <div class="field-group">
      <label>Scout Name</label>
      <input type="text" id="scoutName" placeholder="Name">
    </div>
  </div>

  <div id="panelEI" class="panel active">
    <div class="section">
      <div class="section-header">Community & Outreach Impact</div>
      <div class="field-group">
        <label>Outreach Notes</label>
        <textarea id="eiNotes" placeholder="What makes their program stand out?"></textarea>
      </div>
    </div>
  </div>

  <div id="panelPerf" class="panel">
    <div class="section">
      <div class="section-header">Robot Capabilities</div>
      <div class="field-group">
        <label>Primary Role</label>
        <select id="role">
          <option>High Scorer</option>
          <option>Defense</option>
          <option>Support/Feeder</option>
        </select>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-clear">Reset</button>
    <button class="btn btn-submit">Save to Firebase</button>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    if(tab === 'ei') {
      document.getElementById('panelEI').classList.add('active');
      event.currentTarget.classList.add('active');
    } else {
      document.getElementById('panelPerf').classList.add('active');
      event.currentTarget.classList.add('active');
    }
  }
</script>

</body>
</html>
